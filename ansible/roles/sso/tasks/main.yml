---
# Authelia + nginx reverse proxy + dnsmasq for SSO.
# Sets up *.homelab.internal with wildcard self-signed cert.

- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: present
    update_cache: true

- name: Configure dnsmasq for homelab.internal
  ansible.builtin.copy:
    dest: /etc/dnsmasq.d/homelab.conf
    mode: "0644"
    content: |
      # Resolve *.homelab.internal to the Docker host
      address=/{{ homelab_domain }}/{{ docker_host_ip }}
  notify: Restart dnsmasq

- name: Enable and start dnsmasq
  ansible.builtin.service:
    name: dnsmasq
    state: started
    enabled: true

- name: Create Authelia config directory
  ansible.builtin.file:
    path: "{{ authelia_config_dir }}"
    state: directory
    mode: "0755"

- name: Create nginx config directory
  ansible.builtin.file:
    path: "{{ nginx_config_dir }}"
    state: directory
    mode: "0755"

- name: Create nginx certs directory
  ansible.builtin.file:
    path: "{{ nginx_certs_dir }}"
    state: directory
    mode: "0700"

- name: Generate self-signed wildcard certificate
  ansible.builtin.shell: |
    if [ -f {{ nginx_certs_dir }}/homelab.crt ]; then
      echo "Certificate already exists"
      exit 0
    fi
    openssl req -x509 -nodes -days {{ cert_days }} \
      -newkey rsa:2048 \
      -keyout {{ nginx_certs_dir }}/homelab.key \
      -out {{ nginx_certs_dir }}/homelab.crt \
      -subj "/CN={{ cert_cn }}" \
      -addext "subjectAltName=DNS:{{ homelab_domain }},DNS:*.{{ homelab_domain }}"
    chmod 600 {{ nginx_certs_dir }}/homelab.key
    echo "Generated new certificate"
  register: cert_result
  changed_when: "'Generated' in cert_result.stdout"

- name: Deploy Authelia configuration
  ansible.builtin.template:
    src: authelia-config.yml.j2
    dest: "{{ authelia_config_dir }}/configuration.yml"
    mode: "0600"

- name: Deploy Authelia users database
  ansible.builtin.template:
    src: users_database.yml.j2
    dest: "{{ authelia_config_dir }}/users_database.yml"
    mode: "0600"

- name: Deploy nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ nginx_config_dir }}/nginx.conf"
    mode: "0644"

- name: Add Authelia and nginx to Docker Compose (if not already present)
  ansible.builtin.blockinfile:
    path: "{{ docker_compose_dir }}/docker-compose.yml"
    marker: "# {mark} ANSIBLE MANAGED — SSO"
    block: |

      # --- SSO (Authelia + nginx) ---
        authelia:
          image: authelia/authelia:latest
          container_name: authelia
          volumes:
            - ./authelia:/config
          ports:
            - "{{ authelia_port }}:9091"
          networks:
            - proxy
          restart: unless-stopped

        nginx-proxy:
          image: nginx:latest
          container_name: nginx-proxy
          volumes:
            - ./nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./nginx-proxy/certs:/etc/nginx/certs:ro
          ports:
            - "443:443"
          depends_on:
            - authelia
          networks:
            - proxy
          restart: unless-stopped
    insertbefore: "^$"
  failed_when: false

- name: Restart SSO containers
  ansible.builtin.shell: |
    cd {{ docker_compose_dir }}
    docker compose up -d authelia nginx-proxy
  args:
    executable: /bin/bash
  changed_when: false

handlers:
  - name: Restart dnsmasq
    ansible.builtin.service:
      name: dnsmasq
      state: restarted
