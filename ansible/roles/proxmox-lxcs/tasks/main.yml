---
# Create LXC containers on Proxmox nodes.
# Only creates containers whose node matches the current host.

- name: Ensure LXC template is available
  ansible.builtin.command:
    cmd: pveam download {{ lxc_template_storage }} {{ lxc_template }}
  args:
    creates: "/var/lib/vz/template/cache/{{ lxc_template }}"

- name: Create LXC containers for this node
  ansible.builtin.shell: |
    set -e
    VMID={{ item.key }}

    # Skip if container already exists
    if pct status $VMID >/dev/null 2>&1; then
      echo "LXC $VMID already exists, skipping"
      exit 0
    fi

    pct create $VMID \
      {{ lxc_template_storage }}:vztmpl/{{ item.value.template | default(lxc_template) }} \
      --hostname {{ item.value.hostname }} \
      --cores {{ item.value.cores }} \
      --memory {{ item.value.memory }} \
      --swap {{ item.value.swap | default(512) }} \
      --rootfs {{ lxc_disk_storage }}:{{ item.value.disk }} \
      --net0 name=eth0,bridge={{ lxc_network_bridge }},ip={{ item.value.ip }},gw={{ item.value.gateway }} \
      {% if item.value.privileged | default(false) %}--unprivileged 0{% else %}--unprivileged 1{% endif %} \
      {% if item.value.features is defined %}--features {{ item.value.features }}{% endif %} \
      --onboot 1 \
      --start 0

    echo "Created LXC $VMID ({{ item.value.hostname }})"
  args:
    executable: /bin/bash
  loop: "{{ lxc_containers | dict2items }}"
  when:
    - item.value.node == inventory_hostname
    - item.value.ip | length > 0
  register: lxc_create_result
  changed_when: "'Created LXC' in lxc_create_result.stdout | default('')"

- name: Build flat list of mount points for this node's containers
  ansible.builtin.set_fact:
    lxc_mountpoint_list: >-
      {%- set entries = [] -%}
      {%- for vmid, spec in lxc_containers.items() -%}
        {%- if spec.node | default('') == inventory_hostname and spec.ip | default('') | length > 0 -%}
          {%- for mp_name, mp_value in (spec.mountpoints | default({})).items() -%}
            {%- set _ = entries.append({'vmid': vmid, 'mp_name': mp_name, 'mp_value': mp_value}) -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ entries }}

- name: Configure mount points for LXC containers
  ansible.builtin.shell: |
    pct set {{ item.vmid }} --{{ item.mp_name }} {{ item.mp_value }}
  loop: "{{ lxc_mountpoint_list }}"
  loop_control:
    label: "{{ item.vmid }} {{ item.mp_name }}"
  changed_when: false

- name: Start LXC containers
  ansible.builtin.command:
    cmd: "pct start {{ item.key }}"
  loop: "{{ lxc_containers | dict2items }}"
  when:
    - item.value.node == inventory_hostname
    - item.value.ip | length > 0
  register: lxc_start_result
  changed_when: lxc_start_result.rc == 0
  # Tolerate only "already running" — any other failure is real
  failed_when: >-
    lxc_start_result.rc != 0
    and 'already running' not in (lxc_start_result.stderr | default(''))
