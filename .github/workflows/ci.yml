---
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ansible:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Install required collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: YAML sanity check (yaml.safe_load over ansible/**/*.yml)
        run: |
          python - <<'EOF'
          import glob, sys, yaml
          bad = 0
          files = sorted(glob.glob('ansible/**/*.yml', recursive=True))
          files.append('docker-compose.example.yml')
          for f in files:
              try:
                  list(yaml.safe_load_all(open(f)))
              except Exception as e:
                  bad += 1
                  print(f"FAIL {f}: {e}")
          print(f"{len(files)} files checked, {bad} failed")
          sys.exit(1 if bad else 0)
          EOF

      - name: Playbook syntax check
        run: ansible-playbook --syntax-check -i ansible/inventory.example.yml ansible/playbook.yml

      # min profile: stricter profiles fail only on var-naming[no-role-prefix]
      # and hyphenated role names — churn, not bugs. Revisit if roles get renamed.
      - name: ansible-lint (min profile)
        run: |
          pip install ansible-lint
          ansible-lint --profile min ansible/

  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate
